    Type: AWS::SecretsManager::Secret
    Properties:
      Description: Kid for dispensing proxygen
      KmsKeyId: alias/SecretsKMSKeyAlias
      SecretString: ChangeMe
      Name: !Sub "${AWS::StackName}-Dispensing-ProxygenKid"

