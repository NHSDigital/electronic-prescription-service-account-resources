  DispensingProxygenPtlPublicKey:
    Type: AWS::SecretsManager::Secret
    Properties:
      Description: Public key for dispensing proxygen ptl
      KmsKeyId: alias/SecretsKMSKeyAlias
      SecretString: ChangeMe
