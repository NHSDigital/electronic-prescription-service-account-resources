    Type: AWS::SecretsManager::Secret
    Properties:
      Description: kid for PrescriptionsForPatients proxygen prod
      KmsKeyId: alias/SecretsKMSKeyAlias
      SecretString: ChangeMe
      Name: "PrescriptionsForPatientsProxygen-kid-prod"


  PrescriptionsForPatientsProxygenPtlPrivateKey:
    Type: AWS::SecretsManager::Secret
    Properties:
      Description: Private key for PrescriptionsForPatients proxygen ptl
      KmsKeyId: alias/SecretsKMSKeyAlias
      SecretString: ChangeMe
