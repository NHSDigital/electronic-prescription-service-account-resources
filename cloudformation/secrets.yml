  PrescriptionsForPatientsProxygenKid:
    Type: AWS::SecretsManager::Secret
    Properties:
      Description: Kid for PrescriptionsForPatients proxygen
      KmsKeyId: alias/SecretsKMSKeyAlias
      SecretString: ChangeMe
      Name: !Sub "${AWS::StackName}-PrescriptionsForPatients-ProxygenKid"

  PrescriptionsForPatientsProxygenProdPrivateKey:
    Type: AWS::SecretsManager::Secret
    Properties:
      Description: Private key for PrescriptionsForPatients proxygen prod
      KmsKeyId: alias/SecretsKMSKeyAlias
      SecretString: ChangeMe
      Name: "PrescriptionsForPatientsProxygen-PrivateKey-prod"

  PrescriptionsForPatientsProxygenProdPublicKey:
    Type: AWS::SecretsManager::Secret
    Properties:
      Description: Public key for PrescriptionsForPatients proxygen prod
      KmsKeyId: alias/SecretsKMSKeyAlias
      SecretString: ChangeMe
