name: deploy to environments

on:
  workflow_dispatch:

env:
  BRANCH_NAME: ${{ github.event.ref.BRANCH_NAME }}

jobs:
  get_config_values:
    uses: NHSDigital/eps-common-workflows/.github/workflows/get-repo-config.yml@5ac2707dd9cd60ad127275179495b9c890d74711
    with:
      verify_published_from_main_image: true
  
  quality_checks:
    uses: NHSDigital/eps-common-workflows/.github/workflows/quality-checks-devcontainer.yml@5ac2707dd9cd60ad127275179495b9c890d74711
    needs: [get_config_values]
    with:
      pinned_image: ${{ needs.get_config_values.outputs.pinned_image }}
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  package_code:
    uses: ./.github/workflows/sam_package_code.yml
    needs: get_config_values
    with:
      pinned_image: ${{ needs.get_config_values.outputs.pinned_image }}

  package_cdk_code:
    uses: ./.github/workflows/cdk_package_code.yml
    needs: get_config_values
    with:
      pinned_image: ${{ needs.get_config_values.outputs.pinned_image }}

  get_commit_id:
    runs-on: ubuntu-22.04
    outputs:
      commit_id: ${{ steps.commit_id.outputs.commit_id }}
    steps:
      - name: Get Commit ID
        id: commit_id
        run: |
          echo "commit_id=${{ github.sha }}" >> "$GITHUB_OUTPUT"
  
  tag_release:
    needs: [quality_checks, package_code, package_cdk_code, get_commit_id, get_config_values]
    uses: NHSDigital/eps-common-workflows/.github/workflows/tag-release-devcontainer.yml@7a89b111ae752548e8e3f3fbaeb89bd6ecca0698
    permissions:
      id-token: write
      contents: write
    with:
      dry_run: false
      pinned_image: ${{ needs.get_config_values.outputs.pinned_image }}
      branch_name: main
      tag_format: ${{ needs.get_config_values.outputs.tag_format }}
      update_jira: true
      jira_release_prefix: "account-resources"
    secrets:
      EXECUTE_JIRA_LAMBDA_ROLE: ${{ secrets.DEV_CLOUD_FORMATION_EXECUTE_LAMBDA_ROLE }}
  
  deploy_dev_stacks:
    needs: [get_commit_id, package_code, package_cdk_code, tag_release, get_config_values]
    uses: ./.github/workflows/release_all_stacks.yml
    with:
      pinned_image: ${{ needs.get_config_values.outputs.pinned_image }}
      target_environment: dev
      version: ${{ needs.tag_release.outputs.version_tag }}
      change_set_version: ${{ needs.tag_release.outputs.change_set_version }}
      execute_change_set: true
      lambda_stack_suffix: ""
      artifact_bucket_prefix: ${{needs.tag_release.outputs.version_tag}}
      version_number: ${{needs.tag_release.outputs.version_tag}}
      commit_id: ${{ needs.get_commit_id.outputs.commit_id }}
      lambda_insights_log_group_name: /aws/lambda-insights
      deploy_artillery: true
      deploy_drift_detection: true
      is_pull_request: false
    secrets:
      cf_create_changeset_role: ${{ secrets.DEV_CLOUD_FORMATION_CREATE_CHANGESET_ROLE }}
      cf_deploy_role: ${{ secrets.DEV_CLOUD_FORMATION_DEPLOY_ROLE }}

  deploy_ref_stacks:
    needs:
      [
        get_commit_id,
        package_code,
        package_cdk_code,
        tag_release,
        deploy_dev_stacks,
        get_config_values,
      ]
    uses: ./.github/workflows/release_all_stacks.yml
    with:
      pinned_image: ${{ needs.get_config_values.outputs.pinned_image }}
      target_environment: ref
      version: ${{ needs.tag_release.outputs.version_tag }}
      change_set_version: ${{ needs.tag_release.outputs.change_set_version }}
      execute_change_set: true
      lambda_stack_suffix: ""
      artifact_bucket_prefix: ${{needs.tag_release.outputs.version_tag}}
      version_number: ${{needs.tag_release.outputs.version_tag}}
      commit_id: ${{ needs.get_commit_id.outputs.commit_id }}
      lambda_insights_log_group_name: /aws/lambda-insights
      deploy_artillery: true
      deploy_drift_detection: true
      is_pull_request: false
    secrets:
      cf_create_changeset_role: ${{ secrets.REF_CLOUD_FORMATION_CREATE_CHANGESET_ROLE }}
      cf_deploy_role: ${{ secrets.REF_CLOUD_FORMATION_DEPLOY_ROLE }}

  deploy_qa_stacks:
    needs:
      [
        get_commit_id,
        package_code,
        package_cdk_code,
        tag_release,
        deploy_dev_stacks,
        get_config_values,
      ]
    uses: ./.github/workflows/release_all_stacks.yml
    with:
      pinned_image: ${{ needs.get_config_values.outputs.pinned_image }}
      target_environment: qa
      version: ${{ needs.tag_release.outputs.version_tag }}
      change_set_version: ${{ needs.tag_release.outputs.change_set_version }}
      execute_change_set: true
      lambda_stack_suffix: ""
      artifact_bucket_prefix: ${{needs.tag_release.outputs.version_tag}}
      version_number: ${{needs.tag_release.outputs.version_tag}}
      commit_id: ${{ needs.get_commit_id.outputs.commit_id }}
      lambda_insights_log_group_name: /aws/lambda-insights
      deploy_artillery: false
      deploy_drift_detection: true
      is_pull_request: false
    secrets:
      cf_create_changeset_role: ${{ secrets.QA_CLOUD_FORMATION_CREATE_CHANGESET_ROLE }}
      cf_deploy_role: ${{ secrets.QA_CLOUD_FORMATION_DEPLOY_ROLE }}
  deploy_int_stacks:
    needs:
      [
        get_commit_id,
        package_code,
        package_cdk_code,
        tag_release,
        get_config_values,
        deploy_qa_stacks,
      ]
    uses: ./.github/workflows/release_all_stacks.yml
    with:
      pinned_image: ${{ needs.get_config_values.outputs.pinned_image }}
      target_environment: int
      version: ${{ needs.tag_release.outputs.version_tag }}
      change_set_version: ${{ needs.tag_release.outputs.change_set_version }}
      execute_change_set: true
      lambda_stack_suffix: ""
      artifact_bucket_prefix: ${{needs.tag_release.outputs.version_tag}}
      version_number: ${{needs.tag_release.outputs.version_tag}}
      commit_id: ${{ needs.get_commit_id.outputs.commit_id }}
      lambda_insights_log_group_name: /aws/lambda-insights
      deploy_artillery: false
      deploy_drift_detection: true
      is_pull_request: false
    secrets:
      cf_create_changeset_role: ${{ secrets.INT_CLOUD_FORMATION_CREATE_CHANGESET_ROLE }}
      cf_deploy_role: ${{ secrets.INT_CLOUD_FORMATION_DEPLOY_ROLE }}

  deploy_prod_stacks:
    needs:
      [
        get_commit_id,
        package_code,
        package_cdk_code,
        tag_release,
        deploy_int_stacks,
        get_config_values,
      ]
    uses: ./.github/workflows/release_all_stacks.yml
    with:
      pinned_image: ${{ needs.get_config_values.outputs.pinned_image }}
      target_environment: prod
      version: ${{ needs.tag_release.outputs.version_tag }}
      change_set_version: ${{ needs.tag_release.outputs.change_set_version }}
      execute_change_set: true
      lambda_stack_suffix: ""
      artifact_bucket_prefix: ${{needs.tag_release.outputs.version_tag}}
      version_number: ${{needs.tag_release.outputs.version_tag}}
      commit_id: ${{ needs.get_commit_id.outputs.commit_id }}
      lambda_insights_log_group_name: /aws/lambda-insights
      deploy_artillery: false
      deploy_drift_detection: true
      is_pull_request: false
    secrets:
      cf_create_changeset_role: ${{ secrets.PROD_CLOUD_FORMATION_CREATE_CHANGESET_ROLE }}
      cf_deploy_role: ${{ secrets.PROD_CLOUD_FORMATION_DEPLOY_ROLE }}
